<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Cliq — Build stronger digital connections with short links, QR codes, and analytics." />
  <title>Cliq — Build stronger digital connections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    /* Hide default Google Translate bar — be specific to avoid hiding page content */
    .goog-te-banner-frame {
      display: none !important;
    }

    #goog-gt-tt,
    .goog-te-balloon-frame {
      display: none !important;
    }

    body {
      top: 0 !important;
    }

    body>.skiptranslate {
      display: none !important;
    }

    .goog-text-highlight {
      background: none !important;
      box-shadow: none !important;
    }
  </style>
</head>

<body>
  <div id="google_translate_element" style="display:none;"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        autoDisplay: false,
        includedLanguages: 'en,de,fr,it,pt,es,th',
      }, 'google_translate_element');
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>

</html>
